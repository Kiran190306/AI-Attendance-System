<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Attendance Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Attendance Dashboard</h1>
            <div class="controls">
                <button onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Students</div>
                <div class="value" id="total">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Present Today</div>
                <div class="value" id="present">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Attendance %</div>
                <div class="value" id="percentage">0%</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="attendanceChart"></canvas>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="attendanceTable">
                    <tr>
                        <td colspan="3">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let chart = null;

        async function loadData() {
            try {
                // Load analytics
                const analyticsResponse = await fetch('/api/analytics');
                const analytics = await analyticsResponse.json();

                document.getElementById('total').textContent = analytics.total;
                document.getElementById('present').textContent = analytics.present;
                document.getElementById('percentage').textContent = analytics.attendance_percentage + '%';

                // Load attendance records
                const attendanceResponse = await fetch('/api/attendance');
                const attendanceData = await attendanceResponse.json();

                updateTable(attendanceData.data || []);
                updateChart(attendanceData.data || []);

            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function updateTable(records) {
            const tbody = document.getElementById('attendanceTable');

            if (!records || records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No records found</td></tr>';
                return;
            }

            tbody.innerHTML = records.map(record => `
                <tr>
                    <td>${record.name}</td>
                    <td>${record.time}</td>
                    <td>${record.status}</td>
                </tr>
            `).join('');
        }

        function updateChart(records) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');

            // Group by hour
            const hourlyData = {};
            records.forEach(record => {
                const hour = record.time.split(' ')[1]?.split(':')[0] || '00';
                hourlyData[hour] = (hourlyData[hour] || 0) + 1;
            });

            const labels = Object.keys(hourlyData).sort();
            const data = labels.map(hour => hourlyData[hour]);

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Attendance Count',
                        data: data,
                        backgroundColor: 'rgba(102, 126, 234, 0.6)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function logout() {
            window.location.href = '/logout';
        }

        // Auto refresh every 5 seconds
        setInterval(loadData, 5000);

        // Initial load
        loadData();
    </script>
</body>
</html>
